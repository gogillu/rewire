<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Rewire — Alternate endings of Bollywood</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<style>
:root { color-scheme: dark; }
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: #000; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
               "Helvetica Neue", "Inter", sans-serif;
  overflow: hidden;
  overscroll-behavior: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#deck {
  height: 100dvh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
}
#deck::-webkit-scrollbar { display: none; }

.card {
  position: relative;
  height: 100dvh;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  overflow: hidden;
  isolation: isolate;
  background: #0b0b0b;
}
.card .poster {
  position: absolute; inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.55) saturate(1.05);
  transition: opacity .5s ease, transform 1.6s ease;
  transform: scale(1.08);
  opacity: 0;
}
.card.ready .poster { opacity: 1; transform: scale(1); }
.card .vignette {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 40%, transparent 0%, rgba(0,0,0,.45) 70%, rgba(0,0,0,.85) 100%),
    linear-gradient(180deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,.0) 22%, rgba(0,0,0,.0) 48%, rgba(0,0,0,.55) 72%, rgba(0,0,0,.94) 100%);
  pointer-events: none;
}

/* TOP — movie title + year/rating */
.top {
  position: absolute;
  left: 0; right: 0;
  top: calc(env(safe-area-inset-top, 0px) + 18px);
  padding: 0 16px;
  z-index: 4;
  display: flex; flex-direction: column; gap: 4px;
  align-items: center;
  text-align: center;
  pointer-events: none;
}
.top .title {
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 800;
  letter-spacing: .3px;
  text-shadow: 0 2px 14px rgba(0,0,0,.8);
  max-width: 92vw;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.top .sub {
  font-size: 11px;
  opacity: .7;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  text-shadow: 0 1px 8px rgba(0,0,0,.7);
}

/* BOTTOM — three endings stacked just above brand */
.endings {
  position: absolute;
  left: 0; right: 0;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 54px);
  padding: 0 14px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 3;
}
.ending {
  position: relative;
  border-radius: 18px;
  padding: 14px 16px;
  background: rgba(15,15,18,.55);
  -webkit-backdrop-filter: blur(16px) saturate(170%);
  backdrop-filter: blur(16px) saturate(170%);
  border: 1px solid rgba(255,255,255,.08);
  cursor: pointer;
  transition: transform .18s ease, background .25s ease, border-color .25s ease;
}
.ending:active { transform: scale(.98); }
.ending.liked {
  background: linear-gradient(135deg, rgba(255, 64, 129, .42), rgba(120, 40, 200, .30));
  border-color: rgba(255, 64, 129, .55);
  box-shadow: 0 6px 32px rgba(255, 64, 129, .25);
}
.ending .text {
  font-size: clamp(17px, 4.5vw, 22px);
  font-weight: 700;
  line-height: 1.22;
  letter-spacing: .1px;
  text-shadow: 0 2px 14px rgba(0,0,0,.6);
}
.ending .row {
  margin-top: 8px;
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
}
.ending .heart {
  width: 17px; height: 17px;
  display: inline-block;
  background: currentColor;
  -webkit-mask: var(--heart) center/contain no-repeat;
          mask: var(--heart) center/contain no-repeat;
  opacity: .85;
}
.ending.liked .heart { color: #ff4081; opacity: 1; }
:root {
  --heart: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='black' d='M12 21s-7.5-4.7-9.6-9.4C1 7.7 4 4 7.5 4c2 0 3.7 1 4.5 2.6C12.8 5 14.5 4 16.5 4 20 4 23 7.7 21.6 11.6 19.5 16.3 12 21 12 21z'/></svg>");
}
.ending .likes {
  font-variant-numeric: tabular-nums;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: .3px;
}
.ending .likes-pulse {
  position: absolute;
  top: 10px; right: 14px;
  font-size: 12px;
  opacity: .55;
  letter-spacing: .8px;
  text-transform: uppercase;
}
.ending.placeholder {
  background: rgba(20,20,20,.30);
  cursor: default;
  pointer-events: none;
}
.ending.placeholder .text { opacity: .55; font-style: italic; font-weight: 500; }

/* BOTTOM brand chip */
.brand {
  position: absolute;
  left: 0; right: 0;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
  z-index: 4;
  text-align: center;
  pointer-events: none;
}
.brand .logo {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 5px;
  text-transform: uppercase;
  background-image: linear-gradient(90deg, #ff8a00, #ff007a 35%, #8e2de2 70%, #4a00e0);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
}
.brand .logo::before {
  content: "◆";
  margin-right: 6px;
  -webkit-text-fill-color: #ff007a;
  font-size: 10px;
}

.audio-toggle {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 14px);
  right: 14px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,.45);
  border: 1px solid rgba(255,255,255,.1);
  color: #fff;
  z-index: 11;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-backdrop-filter: blur(10px);
          backdrop-filter: blur(10px);
}
.audio-toggle svg { width: 18px; height: 18px; fill: currentColor; }

#splash {
  position: fixed; inset: 0;
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  background: radial-gradient(ellipse at center, #1a0033, #000);
  text-align: center;
  cursor: pointer;
  transition: opacity .5s ease;
}
#splash.gone { opacity: 0; pointer-events: none; }
#splash .title {
  font-size: clamp(48px, 14vw, 80px);
  font-weight: 900;
  letter-spacing: 8px;
  background-image: linear-gradient(90deg, #ff8a00, #ff007a 35%, #8e2de2 70%, #4a00e0);
  -webkit-background-clip: text;
          background-clip: text;
  -webkit-text-fill-color: transparent;
}
#splash .tag { margin-top: 12px; opacity: .65; font-size: 13px; letter-spacing: 1.4px; text-transform: uppercase; }
#splash .cta { margin-top: 36px; font-size: 12px; opacity: .55; letter-spacing: 2px; text-transform: uppercase; animation: pulse 1.6s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.85} }

#empty {
  position: fixed; inset: 0;
  display: none; align-items: center; justify-content: center;
  z-index: 50; text-align: center; padding: 24px;
}
#empty.show { display: flex; }
#empty p { opacity: .6; max-width: 360px; line-height: 1.5; }
</style>
</head>
<body>
<div id="splash">
  <div class="title">REWIRE</div>
  <div class="tag">Alternate Endings · Bollywood</div>
  <div class="cta">Tap to begin</div>
</div>

<button class="audio-toggle" id="audioBtn" aria-label="Toggle sound">
  <svg viewBox="0 0 24 24" id="audioIcon"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
</button>

<div id="deck"></div>
<div id="empty"><p>Loading the alternate universe…</p></div>

<script src="/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
